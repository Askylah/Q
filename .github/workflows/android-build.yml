name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: |
          cd vite-project
          npm install

      - name: Build Web App
        run: |
          cd vite-project
          npm run build

      - name: Sync Capacitor
        run: |
          cd vite-project
          npx cap sync android

      - name: Build Android APK
        run: |
          cd vite-project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q_Mobile_APK
          path: vite-project/android/app/build/outputs/apk/debug/app-debug.apk
